# SmoothNAS plugin manifest for llama.cpp (AMD Vulkan variant).
# Same shape as smoothnas-plugin.yaml; only image + GPU profile change.
#
# Vulkan (not ROCm) is the AMD path: the upstream server-vulkan image
# talks to the GPU through /dev/dri, which is the same device node the
# gpu-amd profile already binds. ROCm would additionally require
# /dev/kfd and a matching kernel/runtime version, which is fragile on
# the SmoothNAS host kernel — Vulkan works on every AMD GPU with a
# Mesa-supported driver out of the box.

apiVersion: smoothnas.io/v1
kind: Plugin

metadata:
  name: llama-cpp
  version: 0.1.0 # x-release-please-version
  description: |
    llama.cpp inference server with AMD Vulkan acceleration.
    Models live on the NVME slot of an operator-chosen tier.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-llama-cpp

artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-llama-cpp:0.1.0-vulkan

container:
  command:
    - "--model"
    - "${MODEL_PATH}"
    - "--n-gpu-layers"
    - "${N_GPU_LAYERS}"
    - "--ctx-size"
    - "${CTX_SIZE}"
    - "--parallel"
    - "${PARALLEL_SLOTS}"
  restartPolicy: unless-stopped
  resources:
    memory: "${MEMORY_LIMIT}"

volumes:
  - name: models
    mode: tier-bound
    slot: NVME
    minSize: 50G
    bind: /models

ports:
  - name: http
    port: 8080
    protocol: tcp
    expose: true

ui:
  embed:
    path: /
    auth: bearer-injected

profiles:
  - gpu-amd
  - default-limits

config:
  - key: MODEL_PATH
    type: string
    label: Model GGUF path
    default: /models/Qwen_Qwen3.6-35B-A3B-Q5_K_M.gguf
    description: Model file (path inside the container). Default targets Qwen3.6 35B-A3B Q5_K_M.
  - key: N_GPU_LAYERS
    type: number
    label: GPU layers
    default: "999"
    min: "0"
    step: "1"
    description: Number of model layers to offload to GPU. 999 = all.
  - key: CTX_SIZE
    type: number
    label: Context window
    default: "524288"
    min: "1024"
    step: "1024"
    unit: tokens
    description: Total server context in tokens. 524288 gives 128K per slot with the default 4 request slots.
  - key: PARALLEL_SLOTS
    type: number
    label: Request slots
    default: "4"
    min: "1"
    max: "16"
    step: "1"
    description: llama.cpp parallel request slots passed to --parallel.
  - key: MEMORY_LIMIT
    type: string
    label: Container memory
    default: 64GiB
    description: LXC memory limit for the llama.cpp container.
  - key: LLAMA_ARG_FLASH_ATTN
    type: select
    label: Flash attention
    default: "on"
    options:
      - value: "on"
      - value: "off"
    description: Enables llama.cpp flash attention.
  - key: LLAMA_ARG_CACHE_TYPE_K
    type: select
    label: K cache type
    default: q8_0
    options:
      - value: q8_0
      - value: q5_0
      - value: q4_0
    description: KV cache K quantization. Q8 preserves quality.
  - key: LLAMA_ARG_CACHE_TYPE_V
    type: select
    label: V cache type
    default: q8_0
    options:
      - value: q8_0
      - value: q5_0
      - value: q4_0
    description: KV cache V quantization. Q8 preserves quality.
  - key: SPECULATIVE_MODE
    type: select
    label: Speculative decoding
    default: none
    options:
      - value: none
      - value: draft-mtp
    description: Enables llama.cpp speculative decoding. Use draft-mtp only with a llama.cpp build and Qwen GGUF that support MTP.
  - key: SPEC_DRAFT_MODEL_PATH
    type: string
    label: Draft/MTP GGUF path
    default: ""
    description: Optional draft/MTP model path inside the container. Leave empty when the target GGUF includes its own MTP draft tensors.
  - key: SPEC_DRAFT_MAX_TOKENS
    type: number
    label: Draft max tokens
    default: "16"
    min: "1"
    step: "1"
    description: Maximum number of draft tokens proposed during speculative decoding.
  - key: SPEC_DRAFT_MIN_TOKENS
    type: number
    label: Draft min tokens
    default: "0"
    min: "0"
    step: "1"
    description: Minimum number of draft tokens used during speculative decoding.
  - key: SPEC_DRAFT_P_MIN
    type: number
    label: Draft probability floor
    default: "0.75"
    min: "0"
    max: "1"
    step: "0.01"
    description: Minimum speculative decoding probability passed to --spec-draft-p-min.
  - key: SPEC_DRAFT_P_SPLIT
    type: number
    label: Draft split probability
    default: "0.10"
    min: "0"
    max: "1"
    step: "0.01"
    description: Speculative decoding split probability passed to --spec-draft-p-split.
  - key: SPEC_DRAFT_CACHE_TYPE_K
    type: select
    label: Draft K cache type
    default: q8_0
    options:
      - value: q8_0
      - value: q5_0
      - value: q4_0
    description: KV cache K quantization for the draft/MTP model.
  - key: SPEC_DRAFT_CACHE_TYPE_V
    type: select
    label: Draft V cache type
    default: q8_0
    options:
      - value: q8_0
      - value: q5_0
      - value: q4_0
    description: KV cache V quantization for the draft/MTP model.
  - key: SPEC_DRAFT_GPU_LAYERS
    type: number
    label: Draft GPU layers
    default: "999"
    min: "0"
    step: "1"
    description: Number of draft/MTP model layers to offload to GPU. 999 = all.
  - key: SPEC_DRAFT_CPU_MOE_LAYERS
    type: number
    label: Draft CPU MoE layers
    default: "0"
    min: "0"
    step: "1"
    description: Number of draft model MoE layers left on CPU/system RAM.
  - key: LLAMA_ARG_N_CPU_MOE
    type: number
    label: CPU MoE layers
    default: "10"
    min: "0"
    step: "1"
    description: Number of MoE layers left on CPU/system RAM so active experts can fit VRAM.
  - key: LLAMA_ARG_FIT
    type: select
    label: Fit model to VRAM
    default: "off"
    options:
      - value: "off"
      - value: "on"
    description: Leave off to allow overfill/GTT when model weights exceed VRAM.
  - key: SMOOTHNAS_BEARER_EXPECTED
    type: string
    secret: true
    description: Auto-populated by SmoothNAS; do not edit manually.
