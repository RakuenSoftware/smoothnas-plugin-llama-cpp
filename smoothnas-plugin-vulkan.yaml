# SmoothNAS plugin manifest for llama.cpp (AMD Vulkan variant).
# Same shape as smoothnas-plugin.yaml; only image + GPU profile change.
#
# Vulkan (not ROCm) is the AMD path: the upstream server-vulkan image
# talks to the GPU through /dev/dri, which is the same device node the
# gpu-amd profile already binds. ROCm would additionally require
# /dev/kfd and a matching kernel/runtime version, which is fragile on
# the SmoothNAS host kernel — Vulkan works on every AMD GPU with a
# Mesa-supported driver out of the box.

apiVersion: smoothnas.io/v1
kind: Plugin

metadata:
  name: llama-cpp
  version: 0.1.0 # x-release-please-version
  description: |
    llama.cpp inference server with AMD Vulkan acceleration.
    Models live on the NVME slot of an operator-chosen tier.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-llama-cpp

artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-llama-cpp:0.1.0-vulkan

container:
  command:
    - "--model"
    - "${MODEL_PATH}"
    - "--n-gpu-layers"
    - "${N_GPU_LAYERS}"
    - "--ctx-size"
    - "${CTX_SIZE}"
    - "--parallel"
    - "${PARALLEL_SLOTS}"
  restartPolicy: unless-stopped

volumes:
  - name: models
    mode: tier-bound
    slot: NVME
    minSize: 50G
    bind: /models

ports:
  - name: http
    port: 8080
    protocol: tcp
    expose: true

ui:
  embed:
    path: /
    auth: bearer-injected

profiles:
  - gpu-amd
  - default-limits

config:
  - key: MODEL_PATH
    type: string
    label: Model GGUF path
    default: /models/qwen3.6-27b-128k-q5.gguf
    description: Model file (path inside the container). Default targets Qwen3.6 27B 128K Q5.
  - key: N_GPU_LAYERS
    type: number
    label: GPU layers
    default: "999"
    min: "0"
    step: "1"
    description: Number of model layers to offload to GPU. 999 = all.
  - key: CTX_SIZE
    type: number
    label: Context window
    default: "131072"
    min: "1024"
    step: "1024"
    unit: tokens
    description: Context window in tokens. 131072 selects the 128K Qwen context target.
  - key: PARALLEL_SLOTS
    type: number
    label: Request slots
    default: "2"
    min: "1"
    max: "16"
    step: "1"
    description: llama.cpp parallel request slots passed to --parallel.
  - key: SMOOTHNAS_BEARER_EXPECTED
    type: string
    secret: true
    description: Auto-populated by SmoothNAS; do not edit manually.
