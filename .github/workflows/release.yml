name: release

# Builds + publishes the three plugin variants on tag push.
# Tag format is plain semver: v0.1.0, v0.1.1, v1.0.0-rc1, etc.
#
# Each variant is built from the single Dockerfile via the
# LLAMA_BASE build-arg. The pushed-image digest is read back from
# buildx output and spliced into the matching manifest's
# artifact.image before the manifests are attached to the GitHub
# release. Operators downloading the manifests get a digest-pinned
# image reference, not a moving tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # gh release create
  packages: write   # ghcr.io push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: wrapper tests
        working-directory: wrapper
        run: |
          go vet ./...
          go test -race ./...

  publish:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - { name: cuda,   base: ghcr.io/ggml-org/llama.cpp:server-cuda }
          - { name: vulkan, base: ghcr.io/ggml-org/llama.cpp:server-vulkan }
          - { name: cpu,    base: ghcr.io/ggml-org/llama.cpp:server }
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR rejects uppercase tags ("repository name must be lowercase").
      # The org slug is `RakuenSoftware` in github.repository, so we
      # lowercase the whole reference before passing it to buildx.
      - name: Compute lowercase image ref
        id: image
        run: echo "ref=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ steps.version.outputs.version }}-${{ matrix.variant.name }}" >> "$GITHUB_OUTPUT"

      - name: Build + push (${{ matrix.variant.name }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}
          build-args: |
            LLAMA_BASE=${{ matrix.variant.base }}
          # buildx pushes a manifest list; the digest output here is
          # the index digest, which is what we pin in the manifest.
          provenance: false

      - name: Write digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "buildx did not return an image digest" >&2
            exit 1
          fi
          echo "$digest" > "digest-${{ matrix.variant.name }}.txt"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.variant.name }}
          path: digest-${{ matrix.variant.name }}.txt
          if-no-files-found: error

  release:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download pushed-image digests
        uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          merge-multiple: true

      - name: Render manifests with pinned digests
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p release
          for variant in cuda vulkan cpu; do
            src="smoothnas-plugin.yaml"
            if [ "$variant" != "cuda" ]; then
              src="smoothnas-plugin-${variant}.yaml"
            fi
            digest="$(cat "digest-${variant}.txt")"
            if [ -z "$digest" ]; then
              echo "missing digest for $variant" >&2
              exit 1
            fi
            out="release/$(basename $src)"
            image="ghcr.io/rakuensoftware/smoothnas-plugin-llama-cpp:${version}-${variant}@${digest}"
            # Release manifests are the installable artifacts: set the
            # manifest version and pin the image to the exact digest that
            # buildx just pushed, while preserving the variant tag.
            python3 - "$src" "$out" "$version" "$image" <<'EOF'
          import re
          import sys

          src, out, version, image = sys.argv[1:]
          with open(src, encoding="utf-8") as f:
              manifest = f.read()

          manifest = re.sub(
              r'(?m)^(\s*version:\s*)[^\s#]+(\s*#.*)?$',
              rf'\g<1>{version}\2',
              manifest,
              count=1,
          )
          manifest = re.sub(
              r'(?m)^(\s*image:\s*)ghcr\.io/rakuensoftware/smoothnas-plugin-llama-cpp:[^\s#]+(?:@sha256:[0-9a-f]+)?(\s*#.*)?$',
              rf'\g<1>{image}\2',
              manifest,
              count=1,
          )

          with open(out, "w", encoding="utf-8") as f:
              f.write(manifest)
          EOF
          done
          ls -l release/

      - name: Render index.json
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release/index.json <<EOF
          {
            "plugin": "llama-cpp",
            "version": "${VERSION}",
            "variants": [
              { "name": "cuda",   "manifest": "smoothnas-plugin.yaml",        "profile": "gpu-nvidia" },
              { "name": "vulkan", "manifest": "smoothnas-plugin-vulkan.yaml", "profile": "gpu-amd" },
              { "name": "cpu",    "manifest": "smoothnas-plugin-cpu.yaml",    "profile": "none" }
            ]
          }
          EOF

      # release-please created the GitHub release with its own
      # conventional-commit-derived notes when the release PR merged.
      # We just attach the digest-pinned manifests + index as release
      # assets. generate_release_notes is left at its default (false)
      # so we don't overwrite release-please's notes.
      - name: Attach manifests to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/smoothnas-plugin.yaml
            release/smoothnas-plugin-vulkan.yaml
            release/smoothnas-plugin-cpu.yaml
            release/index.json
