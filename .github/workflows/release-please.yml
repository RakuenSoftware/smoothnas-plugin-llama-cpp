name: release-please

# Bumps the version + opens (or updates) a "Release vX.Y.Z" PR every
# time a conventional commit lands on main. When release-please creates
# a release/tag, this workflow dispatches release.yml for that tag so
# image publishing does not depend on GitHub emitting a tag-push workflow
# from the default GITHUB_TOKEN.

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch release asset publisher
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: gh workflow run release.yml --ref "$TAG_NAME"
