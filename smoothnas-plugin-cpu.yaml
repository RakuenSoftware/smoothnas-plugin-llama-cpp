# SmoothNAS plugin manifest for llama.cpp (CPU-only variant).
# No GPU profile; --n-gpu-layers defaults to 0.

apiVersion: smoothnas.io/v1
kind: Plugin

metadata:
  name: llama-cpp
  version: 0.1.0 # x-release-please-version
  description: |
    llama.cpp inference server, CPU only. For hosts without a GPU,
    or for quick experiments before paying the GPU pull cost.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-llama-cpp

artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-llama-cpp:0.1.0-cpu

container:
  command:
    - "--model"
    - "${MODEL_PATH}"
    - "--ctx-size"
    - "${CTX_SIZE}"
    - "--parallel"
    - "${PARALLEL_SLOTS}"
    - "--threads"
    - "${THREADS}"
  restartPolicy: unless-stopped

volumes:
  - name: models
    mode: tier-bound
    slot: SSD
    minSize: 30G
    bind: /models

ports:
  - name: http
    port: 8080
    protocol: tcp
    expose: true

ui:
  embed:
    path: /
    auth: bearer-injected

profiles:
  - default-limits

config:
  - key: MODEL_PATH
    type: string
    label: Model GGUF path
    default: /models/qwen3.6-27b-128k-q5.gguf
    description: Model file (path inside the container). Default targets Qwen3.6 27B 128K Q5.
  - key: CTX_SIZE
    type: number
    label: Context window
    default: "131072"
    min: "1024"
    step: "1024"
    unit: tokens
    description: Context window in tokens. 131072 selects the 128K Qwen context target; CPU mode may need a smaller value.
  - key: PARALLEL_SLOTS
    type: number
    label: Request slots
    default: "2"
    min: "1"
    max: "16"
    step: "1"
    description: llama.cpp parallel request slots passed to --parallel.
  - key: THREADS
    type: number
    label: CPU threads
    default: "0"
    min: "0"
    step: "1"
    description: CPU threads. 0 = let llama.cpp auto-detect.
  - key: SMOOTHNAS_BEARER_EXPECTED
    type: string
    secret: true
    description: Auto-populated by SmoothNAS; do not edit manually.
