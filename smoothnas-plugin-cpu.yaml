# SmoothNAS plugin manifest for llama.cpp (CPU-only variant).
# No GPU profile; --n-gpu-layers defaults to 0.

apiVersion: smoothnas.io/v1
kind: Plugin

metadata:
  name: llama-cpp
  version: 0.1.0 # x-release-please-version
  description: |
    llama.cpp inference server, CPU only. For hosts without a GPU,
    or for quick experiments before paying the GPU pull cost.
  vendor: smoothnas
  homepage: https://github.com/RakuenSoftware/smoothnas-plugin-llama-cpp

artifact:
  type: oci-image
  image: ghcr.io/rakuensoftware/smoothnas-plugin-llama-cpp:0.1.0-cpu

container:
  command:
    - "--model"
    - "${MODEL_PATH}"
    - "--ctx-size"
    - "${CTX_SIZE}"
    - "--parallel"
    - "${PARALLEL_SLOTS}"
    - "--threads"
    - "${THREADS}"
  restartPolicy: unless-stopped
  resources:
    memory: "${MEMORY_LIMIT}"

volumes:
  - name: models
    mode: tier-bound
    slot: SSD
    minSize: 30G
    bind: /models

ports:
  - name: http
    port: 8080
    protocol: tcp
    expose: true

ui:
  embed:
    path: /
    auth: bearer-injected

profiles:
  - default-limits

config:
  - key: MODEL_PATH
    type: string
    label: Model GGUF path
    default: /models/Qwen_Qwen3.6-35B-A3B-Q5_K_M.gguf
    description: Model file (path inside the container). Default targets Qwen3.6 35B-A3B Q5_K_M.
  - key: CTX_SIZE
    type: number
    label: Context window
    default: "524288"
    min: "1024"
    step: "1024"
    unit: tokens
    description: Total server context in tokens. 524288 gives 128K per slot with the default 4 request slots; CPU mode may need a smaller value.
  - key: PARALLEL_SLOTS
    type: number
    label: Request slots
    default: "4"
    min: "1"
    max: "16"
    step: "1"
    description: llama.cpp parallel request slots passed to --parallel.
  - key: MEMORY_LIMIT
    type: string
    label: Container memory
    default: 64GiB
    description: LXC memory limit for the llama.cpp container.
  - key: LLAMA_ARG_FLASH_ATTN
    type: select
    label: Flash attention
    default: "on"
    options:
      - value: "on"
      - value: "off"
    description: Enables llama.cpp flash attention.
  - key: LLAMA_ARG_CACHE_TYPE_K
    type: select
    label: K cache type
    default: q8_0
    options:
      - value: q8_0
      - value: q5_0
      - value: q4_0
    description: KV cache K quantization. Q8 preserves quality.
  - key: LLAMA_ARG_CACHE_TYPE_V
    type: select
    label: V cache type
    default: q8_0
    options:
      - value: q8_0
      - value: q5_0
      - value: q4_0
    description: KV cache V quantization. Q8 preserves quality.
  - key: THREADS
    type: number
    label: CPU threads
    default: "0"
    min: "0"
    step: "1"
    description: CPU threads. 0 = let llama.cpp auto-detect.
  - key: SMOOTHNAS_BEARER_EXPECTED
    type: string
    secret: true
    description: Auto-populated by SmoothNAS; do not edit manually.
